<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>長谷川商事 — 하세가와 상사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght=400;500;700;900&display=swap');

:root{
  --black:#0a0908;
  --beige:#cdbb96;
  --khaki:#a99a6f;
  --khaki-dim:#7c7256;
  --kraft:#d9c39c;
  --kraft-shadow:#b79968;
  --kraft-line:#a98a5c;
  --red:#8a2d22;
  --red-bright:#b5432f;
  --ink:#241d14;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{ height:100%; background:var(--black); font-family:'Noto Serif KR',serif; color:var(--beige); }
body{ width:100vw; height:100vh; position:relative; overflow:hidden; }
::selection{ background:var(--red); color:var(--kraft); }
img{ -webkit-user-drag:none; user-select:none; }

.screen{ position:absolute; inset:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; overflow:hidden; }
.screen.active{ display:flex; }

/* ================= SCREEN 1 : DOOR ================= */
#screen-door{ background:radial-gradient(ellipse at 50% 35%, rgba(90,100,80,0.08), transparent 60%), linear-gradient(180deg,#0c0b09 0%, #040403 100%); }
.door-wrap{ display:flex; flex-direction:column; align-items:center; gap:24px; }
.door-frame{
  position:relative;
  width:min(70vw, 380px);
  cursor:pointer;
  border-radius:2px;
  box-shadow:0 0 0 1px rgba(169,136,79,0.2), 0 30px 90px rgba(0,0,0,0.85);
  transition:transform 0.5s ease;
  overflow:hidden;
  line-height:0;
}
.door-frame:hover{ transform:translateY(-3px); }
.door-frame img{ display:block; width:100%; height:auto; }
.door-frame.opening{ animation:doorCreak 0.9s ease-in forwards; }
@keyframes doorCreak{
  0%{ transform:rotateY(0deg) scale(1); filter:brightness(1); }
  30%{ transform:rotateY(-8deg) scale(1.01); }
  100%{ transform:rotateY(-58deg) scale(1.05); filter:brightness(0.15); opacity:0; filter:brightness(0.15); opacity:0; }
}
#screen-door.fading{ animation:screenFade 0.9s ease forwards; }
@keyframes screenFade{ to{ opacity:0; } }
.door-hint{ color:var(--khaki-dim); font-size:0.78rem; letter-spacing:0.2em; opacity:0.75; animation:pulseHint 2.6s ease-in-out infinite; }
@keyframes pulseHint{ 0%,100%{opacity:0.3;} 50%{opacity:0.85;} }

/* ================= SCREEN 2 : OFFICE ================= */
#screen-office{ background:radial-gradient(ellipse at 60% 15%, rgba(120,110,70,0.06), transparent 55%), linear-gradient(180deg,#100e0a 0%, #050403 100%); flex-direction:column; gap:10px; }
.office-viewport{
  position:relative;
  width:100%;
  max-width:1200px;
  height:min(78vh, 675px);
  margin:0 auto;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
  display:flex;
  align-items:center;
  box-shadow:0 0 0 1px rgba(169,136,79,0.14), 0 40px 100px rgba(0,0,0,0.8);
  border-radius:4px;
}
.office-viewport::-webkit-scrollbar{ height:6px; }
.office-viewport::-webkit-scrollbar-thumb{ background:rgba(169,136,79,0.4); border-radius:6px; }
.office-inner{
  position:relative;
  height:100%;
  aspect-ratio:1376/768;
  flex:0 0 auto;
  margin:0 auto;
  scroll-snap-align:center;
}
.office-inner img{ display:block; width:100%; height:100%; object-fit:cover; }
.office-vignette{ position:absolute; inset:0; box-shadow:inset 0 0 140px 50px rgba(0,0,0,0.55); pointer-events:none; z-index:3; }

.spot{
  position:absolute; width:9%; aspect-ratio:1/1; cursor:pointer;
  border-radius:50%; z-index:5; transition:box-shadow 0.25s ease, transform 0.25s ease;
  transform:translate(-50%,-50%);
}
.spot:hover, .spot:focus-visible{
  box-shadow:0 0 0 1px rgba(181,67,47,0.55), 0 0 26px 12px rgba(181,67,47,0.5);
  transform:translate(-50%,-50%) scale(1.1);
  outline:none;
}
.spot.found{ box-shadow:0 0 0 1px rgba(169,136,79,0.4); }

.swipe-hint{
  display:none;
  font-size:0.7rem; letter-spacing:0.2em; color:var(--khaki-dim);
  text-align:center; opacity:0.8;
}
@media (max-width:720px){
  .swipe-hint{ display:block; }
}

/* ================= MODAL ================= */
.modal-overlay{ position:fixed; inset:0; background:rgba(4,3,2,0.8); display:none; align-items:center; justify-content:center; z-index:50; padding:20px; }
.modal-overlay.active{ display:flex; animation:overlayFade 0.3s ease; }
@keyframes overlayFade{ from{opacity:0;} to{opacity:1;} }
.kraft-card{
  position:relative; width:min(90vw, 460px); padding:38px 30px 32px;
  background:radial-gradient(circle at 15% 10%, rgba(0,0,0,0.06), transparent 40%), radial-gradient(circle at 85% 90%, rgba(0,0,0,0.08), transparent 45%), linear-gradient(165deg, var(--kraft), var(--kraft-shadow));
  color:var(--ink);
  box-shadow:0 0 0 1px rgba(80,60,30,0.3), 0 30px 70px rgba(0,0,0,0.7);
  clip-path:polygon(0% 2%, 2% 0%, 98% 0%, 100% 3%, 100% 97%, 98% 100%, 3% 100%, 0% 98%);
  transform:scale(0.9) rotate(-1deg);
  animation:paperPop 0.35s ease forwards;
}
@keyframes paperPop{ from{ transform:scale(0.85) rotate(-2deg); opacity:0; } to{ transform:scale(1) rotate(0deg); opacity:1; } }
.kraft-card::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg, rgba(0,0,0,0.015) 0 1px, transparent 1px 3px); pointer-events:none; }
.kraft-close{ position:absolute; top:10px; right:14px; background:none; border:none; font-size:1.3rem; color:var(--red); cursor:pointer; font-family:serif; line-height:1; padding:6px; }
.kraft-close:hover{ color:#4a1010; }
.kraft-title{ font-size:1.05rem; font-weight:700; letter-spacing:0.06em; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--kraft-line); }
.kraft-body{ font-size:0.92rem; line-height:1.85; letter-spacing:0.02em; }
.kraft-stamp{ position:absolute; bottom:14px; right:18px; width:52px; height:52px; border-radius:50%; border:2px solid var(--red); color:var(--red); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:900; letter-spacing:0.05em; transform:rotate(-14deg); opacity:0.75; }

/* ================= SCREEN 3 : PROFILE ================= */
#screen-profile{ background:radial-gradient(ellipse at 50% 0%, rgba(160,60,40,0.10), transparent 55%), linear-gradient(180deg,#0d0b09 0%, #050403 100%); padding:24px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.profile-doc{
  position:relative; width:min(94vw, 940px); max-height:92vh; overflow-y:auto;
  background:radial-gradient(circle at 10% 5%, rgba(0,0,0,0.05), transparent 40%), linear-gradient(165deg, var(--kraft), var(--kraft-shadow) 90%);
  color:var(--ink);
  box-shadow:0 0 0 1px rgba(80,60,30,0.35), 0 50px 120px rgba(0,0,0,0.85);
  clip-path:polygon(0% 1.2%, 1.2% 0%, 98.8% 0%, 100% 1.2%, 100% 98.8%, 98.8% 100%, 1.2% 100%, 0% 98.8%);
  transform:scale(0.4) rotate(-4deg); opacity:0;
  padding:clamp(24px,4vw,56px);
}
.profile-doc.unfold{ animation:unfoldDoc 0.9s cubic-bezier(.2,.9,.25,1) forwards; }
@keyframes unfoldDoc{ 0%{ transform:scale(0.4) rotate(-6deg); opacity:0; } 55%{ opacity:1; } 100%{ transform:scale(1) rotate(0deg); opacity:1; } }
.profile-doc::-webkit-scrollbar{ width:8px; }
.profile-doc::-webkit-scrollbar-thumb{ background:var(--kraft-line); border-radius:8px; }
.profile-eyebrow{ font-size:0.72rem; letter-spacing:0.35em; color:var(--red); margin-bottom:6px; font-weight:700; }

.profile-grid{ display:grid; grid-template-columns:220px 1fr; gap:clamp(20px,4vw,44px); align-items:start; }
.portrait-frame{ position:relative; border:1px solid var(--kraft-line); padding:6px; background:rgba(0,0,0,0.04); width:100%; aspect-ratio:220/300; }
.portrait-caption{ text-align:center; font-size:0.68rem; letter-spacing:0.2em; margin-top:8px; color:var(--khaki-dim); opacity:0.85; }
.profile-name-jp{ font-size:clamp(1.8rem,4vw,2.6rem); font-weight:900; letter-spacing:0.08em; border-bottom:2px solid var(--ink); padding-bottom:10px; margin-bottom:4px; }
.profile-name-kr{ font-size:0.95rem; letter-spacing:0.15em; color:var(--khaki-dim); margin-bottom:20px; }
.profile-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px; }
.stat-box{ border-left:2px solid var(--red); padding-left:10px; }
.stat-label{ font
